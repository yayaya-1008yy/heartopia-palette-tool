<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ハートピアス用 ドット変換ツール</title>
  <style>
    body {
      font-family: sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 20px;
    }

    h1 {
      margin-top: 0;
      margin-bottom: 12px;
    }

    .wrap {
      max-width: 2200px;
      margin: 0 auto;
    }

    .panel {
      background: #fff;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    .canvas-wrap {
      overflow: auto;
      background: #fff;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      margin-bottom: 16px;
      cursor: grab;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }

    .canvas-wrap.dragging {
      cursor: grabbing;
    }

    canvas {
      border: 1px solid #ccc;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      display: block;
      background: white;
    }

    .preview-wrap {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      align-items: flex-start;
    }

    .preview-box {
      background: #fff;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      margin-bottom: 16px;
    }

    .palette-groups {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 14px;
    }

    .group-box {
      background: #fff;
      border-radius: 12px;
      padding: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .group-title {
      font-weight: bold;
      margin-bottom: 8px;
    }

    .colors {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .color-item {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 8px;
      background: #fafafa;
      border-radius: 8px;
      padding: 6px 8px;
      box-sizing: border-box;
    }

    .color-chip {
      width: 24px;
      height: 24px;
      border-radius: 6px;
      border: 1px solid rgba(0,0,0,0.2);
      box-sizing: border-box;
      flex-shrink: 0;
    }

    .color-label {
      font-size: 12px;
      line-height: 1.3;
      word-break: break-all;
    }

    .used-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .used-item {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #fff;
      border-radius: 8px;
      padding: 6px 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      font-size: 13px;
    }

    .used-swatch {
      width: 18px;
      height: 18px;
      border-radius: 4px;
      border: 1px solid rgba(0,0,0,0.2);
      flex-shrink: 0;
    }

    .note {
      font-size: 13px;
      color: #555;
      margin-top: 8px;
    }

    .small {
      font-size: 13px;
      color: #555;
    }

    button, select {
      cursor: pointer;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      background: white;
      color: #222;
      font-size: 14px;
    }

    button {
      background: #222;
      color: white;
      border: none;
    }

    button:hover {
      opacity: 0.9;
    }

    .info-box {
      background: #fff;
      border-radius: 12px;
      padding: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      margin-bottom: 16px;
      font-size: 14px;
    }

    .selected-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .selected-swatch {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      border: 1px solid rgba(0,0,0,0.2);
      display: inline-block;
      vertical-align: middle;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>ハートピアス用 ドット変換ツール</h1>

    <div class="panel">
      <div class="controls">
        <label>
          画像を選ぶ
          <input type="file" id="imageInput" accept="image/*">
        </label>

        <label>
          マス目サイズ
          <select id="sizePreset">
            <option value="65x89" selected>本表紙 - 65×89</option>

            <option value="30x18">16:9 (1) - 30×18</option>
            <option value="50x28">16:9 (2) - 50×28</option>
            <option value="100x56">16:9 (3) - 100×56</option>
            <option value="150x84">16:9 (4) - 150×84</option>

            <option value="30x24">4:3 (1) - 30×24</option>
            <option value="50x38">4:3 (2) - 50×38</option>
            <option value="100x76">4:3 (3) - 100×76</option>
            <option value="150x114">4:3 (4) - 150×114</option>

            <option value="30x30">1:1 (1) - 30×30</option>
            <option value="50x50">1:1 (2) - 50×50</option>
            <option value="100x100">1:1 (3) - 100×100</option>
            <option value="150x150">1:1 (4) - 150×150</option>

            <option value="24x30">3:4 (1) - 24×30</option>
            <option value="38x50">3:4 (2) - 38×50</option>
            <option value="76x100">3:4 (3) - 76×100</option>
            <option value="114x150">3:4 (4) - 114×150</option>

            <option value="18x30">9:16 (1) - 18×30</option>
            <option value="28x50">9:16 (2) - 28×50</option>
            <option value="56x100">9:16 (3) - 56×100</option>
            <option value="84x150">9:16 (4) - 84×150</option>
          </select>
        </label>

        <button id="saveBtn">PNG保存</button>
      </div>
      <div class="note">
        読み込んだ画像は中央で切り取りしてから、近い色相のグループ内で自然に変換するで。
      </div>
    </div>

    <div class="info-box">
      <strong>クリックしたマスの情報</strong>
      <div id="selectedInfo" class="note">まだマスが選ばれてへんで。</div>
    </div>

    <div class="preview-wrap">
      <div class="canvas-wrap" id="canvasWrap">
        <strong>拡大表示</strong>
        <canvas id="canvas"></canvas>
        <div class="note" id="canvasNote">
          1マス = 25px
        </div>
      </div>

      <div class="preview-box">
        <strong>小さいプレビュー</strong>
        <canvas id="previewCanvas"></canvas>
        <div class="note">
          全体バランス確認用
        </div>
      </div>
    </div>

    <div class="panel">
      <div><strong>今回使われた色</strong></div>
      <div id="usedColors" class="used-list"></div>
    </div>

    <div class="palette-groups" id="paletteGroups"></div>
  </div>

  <script>
    const paletteGroups = {
      group1: ["#041616","#414546","#808281","#BEC0BF","#FFFFFF"],
      group2: ["#CF354D","#ED6F72","#A6263D","#F5ACA6","#CA8484","#A35D5F","#69313C","#E7D5D5","#C0ACAB","#745F5E"],
      group3: ["#EA5E29","#F88358","#AB4225","#FDBA9F","#D9927C","#AF6C59","#753B30","#E8D5CF","#C1ADA6","#755D59"],
      group4: ["#F79F19","#FEAE3B","#B17016","#FFCE93","#DAA86D","#B3814C","#785126","#F5E5CE","#CDBCAA","#806F5F"],
      group5: ["#EDCA16","#FAD838","#B39417","#F9E791","#D3BE6F","#AB954A","#756325","#EDE7C7","#C6BFA2","#787258"],
      group6: ["#A7BC15","#B6C931","#758616","#D8DF92","#ADB76E","#85904B","#545E2A","#E5E9C8","#BDC2A4","#6F745E"],
      group7: ["#05A25D","#41B97B","#057547","#9CD9AD","#76B28C","#518869","#255640","#C3E0CC","#9CB7A6","#53695D"],
      group8: ["#048781","#05ABA1","#056A66","#7DCDC2","#54A49B","#2B7D77","#054B4B","#BDE0DA","#98B7B2","#4E6B66"],
      group9: ["#05729B","#049ABB","#055878","#79BBCB","#5192A4","#246D7E","#06495A","#C6DEE2","#9EB6BA","#4F686F"],
      group10: ["#065EA6","#2B83C2","#054783","#84A8CA","#5D80A0","#375B7F","#193B56","#C0CDD5","#9CA6B0","#4C5A67"],
      group11: ["#524DA1","#7477BC","#3E387E","#A2A0C7","#787AA1","#54567D","#323554","#CACAD6","#A1A3B0","#565769"],
      group12: ["#813C8C","#A267A9","#5F2B6D","#B89BB9","#917395","#6C4E74","#432F4B","#CFCAD1","#ABA1AC","#615667"],
      group13: ["#AB3571","#CF6B91","#862558","#D8A1B4","#B4798B","#8A5368","#60344B","#E4D5DA","#BCADB0","#725E67"]
    };

    const hueGroupMap = {
      neutral: ["group1"],
      red: ["group2", "group13", "group1"],
      orange: ["group3", "group4", "group2", "group1"],
      yellow: ["group5", "group4", "group1"],
      green: ["group6", "group7", "group1"],
      cyan: ["group8", "group9", "group1"],
      blue: ["group9", "group10", "group8", "group1"],
      purple: ["group11", "group12", "group13", "group1"],
      pink: ["group13", "group12", "group2", "group1"]
    };

    let cols = 65;
    let rows = 89;
    const cellSize = 25;

    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const previewCanvas = document.getElementById("previewCanvas");
    const previewCtx = previewCanvas.getContext("2d");

    const imageInput = document.getElementById("imageInput");
    const sizePreset = document.getElementById("sizePreset");
    const saveBtn = document.getElementById("saveBtn");
    const paletteGroupsEl = document.getElementById("paletteGroups");
    const usedColorsEl = document.getElementById("usedColors");
    const selectedInfoEl = document.getElementById("selectedInfo");
    const canvasNote = document.getElementById("canvasNote");
    const canvasWrap = document.getElementById("canvasWrap");

    let loadedImage = null;
    let currentPixelData = [];
    let selectedCell = null;
    let isDraggingCanvas = false;
    let dragMoved = false;
    let dragStartX = 0;
    let dragStartY = 0;
    let startScrollLeft = 0;
    let startScrollTop = 0;

    const colorToCodeMap = {};
    const colorToGroupMap = {};
    const flatPalette = [];

    Object.entries(paletteGroups).forEach(([groupName, colors], groupIndex) => {
      colors.forEach((color, colorIndex) => {
        const lower = color.toLowerCase();
        const code = `G${groupIndex + 1}-${String(colorIndex + 1).padStart(2, "0")}`;
        colorToCodeMap[lower] = code;
        colorToGroupMap[lower] = groupName;
        flatPalette.push(color);
      });
    });

    function setCanvasSizes() {
      canvas.width = cols * cellSize;
      canvas.height = rows * cellSize;

      const previewScale = 4;
      previewCanvas.width = cols * previewScale;
      previewCanvas.height = rows * previewScale;
      previewCtx.imageSmoothingEnabled = false;

      canvasNote.textContent = `1マス = ${cellSize}px / ${cols}×${rows} を大きく表示`;
    }

    function hexToRgb(hex) {
      const clean = hex.replace("#", "");
      return {
        r: parseInt(clean.substring(0, 2), 16),
        g: parseInt(clean.substring(2, 4), 16),
        b: parseInt(clean.substring(4, 6), 16)
      };
    }

    function rgbToHsv(r, g, b) {
      r /= 255;
      g /= 255;
      b /= 255;

      const max = Math.max(r, g, b);
      const min = Math.min(r, g, b);
      const d = max - min;

      let h = 0;
      const s = max === 0 ? 0 : d / max;
      const v = max;

      if (d !== 0) {
        switch (max) {
          case r:
            h = ((g - b) / d) % 6;
            break;
          case g:
            h = (b - r) / d + 2;
            break;
          case b:
            h = (r - g) / d + 4;
            break;
        }
        h *= 60;
        if (h < 0) h += 360;
      }

      return { h, s, v };
    }

    function hueDiff(a, b) {
      let d = Math.abs(a - b);
      return Math.min(d, 360 - d);
    }

    function getHueCategory(hsv) {
      if (hsv.s < 0.12) return "neutral";

      const h = hsv.h;

      if (h < 18 || h >= 342) return "red";
      if (h >= 18 && h < 50) return "orange";
      if (h >= 50 && h < 75) return "yellow";
      if (h >= 75 && h < 165) return "green";
      if (h >= 165 && h < 200) return "cyan";
      if (h >= 200 && h < 255) return "blue";
      if (h >= 255 && h < 320) return "purple";
      return "pink";
    }

    function getCandidatePalette(targetRgb) {
      const hsv = rgbToHsv(targetRgb.r, targetRgb.g, targetRgb.b);
      const category = getHueCategory(hsv);
      const groupNames = hueGroupMap[category] || Object.keys(paletteGroups);

      const candidates = [];
      groupNames.forEach(groupName => {
        candidates.push(...paletteGroups[groupName]);
      });

      return candidates;
    }

    function colorDistance(targetRgb, paletteHex) {
      const p = hexToRgb(paletteHex);

      const tr = targetRgb.r;
      const tg = targetRgb.g;
      const tb = targetRgb.b;

      const pr = p.r;
      const pg = p.g;
      const pb = p.b;

      const tHsv = rgbToHsv(tr, tg, tb);
      const pHsv = rgbToHsv(pr, pg, pb);

      const dr = tr - pr;
      const dg = tg - pg;
      const db = tb - pb;

      const rgbDist = dr * dr + dg * dg + db * db;
      const hd = hueDiff(tHsv.h, pHsv.h) / 180;
      const sd = Math.abs(tHsv.s - pHsv.s);
      const vd = Math.abs(tHsv.v - pHsv.v);

      const hueWeight = (tHsv.s < 0.12 || pHsv.s < 0.12) ? 8 : 80;

      return (
        rgbDist * 0.65 +
        (hd * hueWeight) * (hd * hueWeight) +
        (sd * 45) * (sd * 45) +
        (vd * 35) * (vd * 35)
      );
    }

    function getNearestColor(r, g, b) {
      const target = { r, g, b };
      const candidates = getCandidatePalette(target);

      let nearest = candidates[0];
      let minDist = Infinity;

      for (const hex of candidates) {
        const dist = colorDistance(target, hex);
        if (dist < minDist) {
          minDist = dist;
          nearest = hex;
        }
      }

      return nearest;
    }

    function getColorCode(color) {
      return colorToCodeMap[color.toLowerCase()] || "未登録";
    }

    function getTextColorForBackground(hex) {
      const { r, g, b } = hexToRgb(hex);
      const brightness = (r * 299 + g * 587 + b * 114) / 1000;
      return brightness < 140 ? "#ffffff" : "#111111";
    }

    function drawPaletteGroups() {
      paletteGroupsEl.innerHTML = "";

      Object.entries(paletteGroups).forEach(([groupName, colors], groupIndex) => {
        const box = document.createElement("div");
        box.className = "group-box";

        const title = document.createElement("div");
        title.className = "group-title";
        title.textContent = `グループ${groupIndex + 1}`;

        const colorsWrap = document.createElement("div");
        colorsWrap.className = "colors";

        colors.forEach((color, colorIndex) => {
          const item = document.createElement("div");
          item.className = "color-item";

          const chip = document.createElement("div");
          chip.className = "color-chip";
          chip.style.backgroundColor = color;

          const label = document.createElement("div");
          label.className = "color-label";
          label.innerHTML = `<strong>G${groupIndex + 1}-${String(colorIndex + 1).padStart(2, "0")}</strong><br>${color}`;

          item.appendChild(chip);
          item.appendChild(label);
          colorsWrap.appendChild(item);
        });

        box.appendChild(title);
        box.appendChild(colorsWrap);
        paletteGroupsEl.appendChild(box);
      });
    }

    function drawUsedColors() {
      usedColorsEl.innerHTML = "";

      const usedSet = new Set(currentPixelData.flat().filter(Boolean));
      const usedArray = [...usedSet];

      if (usedArray.length === 0) {
        usedColorsEl.innerHTML = '<div class="small">まだ画像が読み込まれてへんで。</div>';
        return;
      }

      usedArray.forEach(color => {
        const item = document.createElement("div");
        item.className = "used-item";

        const swatch = document.createElement("div");
        swatch.className = "used-swatch";
        swatch.style.backgroundColor = color;

        const text = document.createElement("span");
        text.textContent = `${getColorCode(color)} / ${color}`;

        item.appendChild(swatch);
        item.appendChild(text);
        usedColorsEl.appendChild(item);
      });
    }

    function drawGrid() {
      ctx.strokeStyle = "rgba(0,0,0,0.25)";
      ctx.lineWidth = 1;

      for (let x = 0; x <= cols; x++) {
        ctx.beginPath();
        ctx.moveTo(x * cellSize, 0);
        ctx.lineTo(x * cellSize, canvas.height);
        ctx.stroke();
      }

      for (let y = 0; y <= rows; y++) {
        ctx.beginPath();
        ctx.moveTo(0, y * cellSize);
        ctx.lineTo(canvas.width, y * cellSize);
        ctx.stroke();
      }
    }

    function drawSelectedNumberOnCell() {
      if (!selectedCell) return;

      const { x, y, color, code } = selectedCell;

      ctx.strokeStyle = "#000000";
      ctx.lineWidth = 3;
      ctx.strokeRect(x * cellSize, y * cellSize, cellSize, cellSize);

      ctx.fillStyle = getTextColorForBackground(color);
      ctx.font = "bold 8px sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(code, x * cellSize + cellSize / 2, y * cellSize + cellSize / 2);
    }

    function renderPreview() {
      previewCtx.clearRect(0, 0, previewCanvas.width, previewCanvas.height);

      const previewScale = previewCanvas.width / cols;

      for (let y = 0; y < rows; y++) {
        for (let x = 0; x < cols; x++) {
          const color = currentPixelData[y][x];
          if (!color) continue;

          previewCtx.fillStyle = color;
          previewCtx.fillRect(x * previewScale, y * previewScale, previewScale, previewScale);
        }
      }
    }

    function renderPixelData() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      for (let y = 0; y < rows; y++) {
        for (let x = 0; x < cols; x++) {
          const color = currentPixelData[y][x];
          if (!color) continue;

          ctx.fillStyle = color;
          ctx.fillRect(x * cellSize, y * cellSize, cellSize, cellSize);
        }
      }

      drawGrid();
      drawSelectedNumberOnCell();
      drawUsedColors();
      renderPreview();
    }

    function processImage() {
      if (!loadedImage) return;

      const tempCanvas = document.createElement("canvas");
      const tempCtx = tempCanvas.getContext("2d");

      tempCanvas.width = cols;
      tempCanvas.height = rows;
      tempCtx.imageSmoothingEnabled = false;
      tempCtx.clearRect(0, 0, cols, rows);

      const imgW = loadedImage.width;
      const imgH = loadedImage.height;

      const targetRatio = cols / rows;
      const imageRatio = imgW / imgH;

      let sx = 0;
      let sy = 0;
      let sw = imgW;
      let sh = imgH;

      if (imageRatio > targetRatio) {
        sw = imgH * targetRatio;
        sx = (imgW - sw) / 2;
      } else if (imageRatio < targetRatio) {
        sh = imgW / targetRatio;
        sy = (imgH - sh) / 2;
      }

      tempCtx.drawImage(
        loadedImage,
        sx, sy, sw, sh,
        0, 0, cols, rows
      );

      const imageData = tempCtx.getImageData(0, 0, cols, rows);
      const data = imageData.data;

      currentPixelData = [];
      selectedCell = null;
      selectedInfoEl.textContent = "まだマスが選ばれてへんで。";

      for (let y = 0; y < rows; y++) {
        const row = [];

        for (let x = 0; x < cols; x++) {
          const index = (y * cols + x) * 4;
          const r = data[index];
          const g = data[index + 1];
          const b = data[index + 2];
          const a = data[index + 3];

          if (a === 0) {
            row.push("#ffffff");
          } else {
            row.push(getNearestColor(r, g, b));
          }
        }

        currentPixelData.push(row);
      }

      renderPixelData();
    }

    function resetBlankGrid() {
      currentPixelData = Array.from({ length: rows }, () =>
        Array.from({ length: cols }, () => "#ffffff")
      );
      selectedCell = null;
      selectedInfoEl.textContent = "まだマスが選ばれてへんで。";
      renderPixelData();
    }

    function showSelectedCellInfo(x, y) {
      if (x < 0 || x >= cols || y < 0 || y >= rows) return;

      const color = currentPixelData[y][x];
      const code = getColorCode(color);

      selectedCell = { x, y, color, code };

      selectedInfoEl.innerHTML = `
        <div class="selected-row">
          <span><strong>座標:</strong> 横 ${x + 1} / 縦 ${y + 1}</span>
          <span class="selected-swatch" style="background:${color};"></span>
          <span><strong>色番号:</strong> ${code}</span>
          <span><strong>カラーコード:</strong> ${color}</span>
        </div>
      `;

      renderPixelData();
    }

    function startCanvasDrag(clientX, clientY) {
      isDraggingCanvas = true;
      dragMoved = false;
      dragStartX = clientX;
      dragStartY = clientY;
      startScrollLeft = canvasWrap.scrollLeft;
      startScrollTop = canvasWrap.scrollTop;
      canvasWrap.classList.add("dragging");
    }

    function moveCanvasDrag(clientX, clientY) {
      if (!isDraggingCanvas) return;

      const dx = clientX - dragStartX;
      const dy = clientY - dragStartY;

      if (Math.abs(dx) > 3 || Math.abs(dy) > 3) {
        dragMoved = true;
      }

      canvasWrap.scrollLeft = startScrollLeft - dx;
      canvasWrap.scrollTop = startScrollTop - dy;
    }

    function endCanvasDrag() {
      isDraggingCanvas = false;
      canvasWrap.classList.remove("dragging");
    }

    canvasWrap.addEventListener("mousedown", function(e) {
      if (e.button !== 0) return;
      startCanvasDrag(e.clientX, e.clientY);
    });

    window.addEventListener("mousemove", function(e) {
      moveCanvasDrag(e.clientX, e.clientY);
    });

    window.addEventListener("mouseup", function() {
      endCanvasDrag();
    });

    canvasWrap.addEventListener("mouseleave", function() {
      if (!isDraggingCanvas) {
        canvasWrap.classList.remove("dragging");
      }
    });

    canvasWrap.addEventListener("touchstart", function(e) {
      if (!e.touches || e.touches.length !== 1) return;
      const touch = e.touches[0];
      startCanvasDrag(touch.clientX, touch.clientY);
    }, { passive: true });

    canvasWrap.addEventListener("touchmove", function(e) {
      if (!e.touches || e.touches.length !== 1) return;
      const touch = e.touches[0];
      moveCanvasDrag(touch.clientX, touch.clientY);
    }, { passive: true });

    canvasWrap.addEventListener("touchend", function() {
      endCanvasDrag();
    });

    canvas.addEventListener("click", function(e) {
      if (dragMoved) {
        dragMoved = false;
        return;
      }

      const rect = canvas.getBoundingClientRect();
      const x = Math.floor((e.clientX - rect.left) / cellSize);
      const y = Math.floor((e.clientY - rect.top) / cellSize);
      showSelectedCellInfo(x, y);
    });

    imageInput.addEventListener("change", function(e) {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();

      reader.onload = function(event) {
        const img = new Image();
        img.onload = function() {
          loadedImage = img;
          processImage();
        };
        img.src = event.target.result;
      };

      reader.readAsDataURL(file);
    });

    sizePreset.addEventListener("change", function() {
      const [newCols, newRows] = this.value.split("x").map(Number);
      cols = newCols;
      rows = newRows;
      setCanvasSizes();

      if (loadedImage) {
        processImage();
      } else {
        resetBlankGrid();
      }
    });

    saveBtn.addEventListener("click", function() {
      const exportCanvas = document.createElement("canvas");
      const exportCtx = exportCanvas.getContext("2d");
      exportCanvas.width = canvas.width;
      exportCanvas.height = canvas.height;

      for (let y = 0; y < rows; y++) {
        for (let x = 0; x < cols; x++) {
          const color = currentPixelData[y][x];
          exportCtx.fillStyle = color;
          exportCtx.fillRect(x * cellSize, y * cellSize, cellSize, cellSize);
        }
      }

      exportCtx.strokeStyle = "rgba(0,0,0,0.25)";
      exportCtx.lineWidth = 1;

      for (let x = 0; x <= cols; x++) {
        exportCtx.beginPath();
        exportCtx.moveTo(x * cellSize, 0);
        exportCtx.lineTo(x * cellSize, exportCanvas.height);
        exportCtx.stroke();
      }

      for (let y = 0; y <= rows; y++) {
        exportCtx.beginPath();
        exportCtx.moveTo(0, y * cellSize);
        exportCtx.lineTo(exportCanvas.width, y * cellSize);
        exportCtx.stroke();
      }

      const link = document.createElement("a");
      link.download = "heartopia_dot_art.png";
      link.href = exportCanvas.toDataURL("image/png");
      link.click();
    });

    setCanvasSizes();
    resetBlankGrid();
    drawPaletteGroups();
  </script>
</body>
</html>
